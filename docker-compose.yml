version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: invoice-postgres
    restart: always
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: invoice_pass
      POSTGRES_DB: invoice_db
    ports:
      - "5433:5432"
    volumes:
      - invoice_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invoice_user -d invoice_db"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  invoice_pgdata:
