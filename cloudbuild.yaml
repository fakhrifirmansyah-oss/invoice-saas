# ─────────────────────────────────────────────────────────────────────
#  FDBAtech Invoice SaaS — Google Cloud Build CI/CD Pipeline
#  Trigger: Push ke branch 'main' di GitHub
#  Auto deploy ke: Cloud Run (asia-southeast2 / Jakarta)
# ─────────────────────────────────────────────────────────────────────

steps:
  # ── STEP 1: Build Backend Docker Image ──────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-backend'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:latest'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:latest'
      - './backend'

  # ── STEP 2: Build Frontend Docker Image ─────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-frontend'
    args:
      - 'build'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$COMMIT_SHA'
      - '-t'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:latest'
      - '--cache-from'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:latest'
      - './frontend'

  # ── STEP 3: Push Backend Image ──────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-backend'
    waitFor: ['build-backend']
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$COMMIT_SHA'

  # ── STEP 4: Push Frontend Image ─────────────────────────────────────
  - name: 'gcr.io/cloud-builders/docker'
    id: 'push-frontend'
    waitFor: ['build-frontend']
    args:
      - 'push'
      - '$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$COMMIT_SHA'

  # ── STEP 5: Deploy Backend ke Cloud Run ─────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-backend'
    waitFor: ['push-backend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fdbatech-backend'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/backend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=2'
      - '--max-instances=500'
      - '--memory=1Gi'
      - '--cpu=2'
      - '--concurrency=200'
      - '--timeout=30s'
      - '--set-secrets=DATABASE_URL=fdbatech-db-url:latest,JWT_SECRET=fdbatech-jwt-secret:latest,REDIS_URL=fdbatech-redis-url:latest'
      - '--set-env-vars=NODE_ENV=production,PORT=8080'

  # ── STEP 6: Deploy Frontend ke Cloud Run ────────────────────────────
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    id: 'deploy-frontend'
    waitFor: ['push-frontend']
    entrypoint: 'gcloud'
    args:
      - 'run'
      - 'deploy'
      - 'fdbatech-frontend'
      - '--image=$_REGION-docker.pkg.dev/$PROJECT_ID/$_REPO_NAME/frontend:$COMMIT_SHA'
      - '--region=$_REGION'
      - '--platform=managed'
      - '--allow-unauthenticated'
      - '--min-instances=1'
      - '--max-instances=100'
      - '--memory=256Mi'
      - '--cpu=1'
      - '--concurrency=1000'

  # ── STEP 7: Kirim notifikasi Slack/Telegram (opsional) ───────────────
  - name: 'curlimages/curl'
    id: 'notify-deploy'
    waitFor: ['deploy-backend', 'deploy-frontend']
    args:
      - '-s'
      - '-X'
      - 'POST'
      - '$_NOTIFY_WEBHOOK_URL'
      - '-H'
      - 'Content-Type: application/json'
      - '-d'
      - '{"text":"✅ FDBAtech deployed! Commit: $COMMIT_SHA by $TRIGGER_NAME"}'

# Build timeout (maks 20 menit)
timeout: '1200s'

# Substitusi variabel (diisi di Cloud Build Trigger settings)
substitutions:
  _REGION: 'asia-southeast2'
  _REPO_NAME: 'fdbatech-repo'
  _NOTIFY_WEBHOOK_URL: 'https://hooks.slack.com/your-webhook-here'

options:
  logging: CLOUD_LOGGING_ONLY
  machineType: 'E2_HIGHCPU_8'   # Build lebih cepat
