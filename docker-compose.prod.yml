version: '3.8'

services:
  db_prod:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: invoice_user
      POSTGRES_PASSWORD: secure_prod_password
      POSTGRES_DB: invoice_db
    volumes:
      - invoice_pgdata_prod:/var/lib/postgresql/data
    restart: always
    networks:
      - fdbatech_net

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - DATABASE_URL=postgresql://invoice_user:secure_prod_password@db_prod:5432/invoice_db
      - JWT_SECRET=super_secret_jwt_key_for_production
      - PORT=5000
    depends_on:
      - db_prod
    restart: always
    networks:
      - fdbatech_net

  frontend:
    build: 
      context: ./frontend
      dockerfile: Dockerfile
    restart: always
    networks:
      - fdbatech_net

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always
    networks:
      - fdbatech_net

networks:
  fdbatech_net:
    driver: bridge

volumes:
  invoice_pgdata_prod:
