
# ────────────────────────────────────────────────────────
#  Kubernetes Deployment — FDBAtech Backend API
#  Target: GKE (Google Kubernetes Engine) Jakarta
#  Auto-scale: 3 → 100 pods berdasarkan CPU load
# ────────────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: fdbatech-api
  namespace: fdbatech
  labels:
    app: fdbatech-api
    version: "1.0"
spec:
  replicas: 3
  selector:
    matchLabels:
      app: fdbatech-api
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
      maxSurge: 2
  template:
    metadata:
      labels:
        app: fdbatech-api
    spec:
      serviceAccountName: fdbatech-api-sa
      containers:
      - name: api
        image: asia-southeast2-docker.pkg.dev/fdbatech-invoice-prod/fdbatech-repo/backend:latest
        ports:
        - containerPort: 8080
        resources:
          requests:
            memory: "512Mi"
            cpu: "500m"
          limits:
            memory: "2Gi"
            cpu: "2000m"
        env:
        - name: NODE_ENV
          value: "production"
        - name: PORT
          value: "8080"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: fdbatech-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: fdbatech-secrets
              key: redis-url
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: fdbatech-secrets
              key: jwt-secret
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 15
          periodSeconds: 20
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: fdbatech-api-service
  namespace: fdbatech
spec:
  selector:
    app: fdbatech-api
  ports:
  - port: 80
    targetPort: 8080
  type: ClusterIP
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: fdbatech-api-hpa
  namespace: fdbatech
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: fdbatech-api
  minReplicas: 3
  maxReplicas: 100
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
  behavior:
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
      - type: Pods
        value: 10
        periodSeconds: 60
    scaleDown:
      stabilizationWindowSeconds: 300
